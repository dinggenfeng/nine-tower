databaseChangeLog:
  - changeSet:
      id: 19
      author: nine-tower
      changes:
        - createTable:
            tableName: playbook_roles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: playbook_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: order_index
                  type: INT
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            constraintName: uc_playbook_roles
            tableName: playbook_roles
            columnNames: playbook_id, role_id
        - createIndex:
            indexName: idx_playbook_role_role_id
            tableName: playbook_roles
            columns:
              - column:
                  name: role_id
