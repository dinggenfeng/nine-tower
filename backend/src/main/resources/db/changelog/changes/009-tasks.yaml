databaseChangeLog:
  - changeSet:
      id: 9
      author: nine-tower
      changes:
        - createTable:
            tableName: tasks
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: module
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: args
                  type: TEXT
              - column:
                  name: when_condition
                  type: VARCHAR(500)
              - column:
                  name: loop
                  type: VARCHAR(500)
              - column:
                  name: until
                  type: VARCHAR(500)
              - column:
                  name: register
                  type: VARCHAR(100)
              - column:
                  name: notify
                  type: TEXT
              - column:
                  name: task_order
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: become_flag
                  type: BOOLEAN
              - column:
                  name: become_user
                  type: VARCHAR(100)
              - column:
                  name: ignore_errors
                  type: BOOLEAN
              - column:
                  name: parent_task_id
                  type: BIGINT
              - column:
                  name: block_section
                  type: VARCHAR(20)
        - createIndex:
            indexName: idx_task_role_id
            tableName: tasks
            columns:
              - column:
                  name: role_id
        - createIndex:
            indexName: idx_task_parent_task_id
            tableName: tasks
            columns:
              - column:
                  name: parent_task_id
