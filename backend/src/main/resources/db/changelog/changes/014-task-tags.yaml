databaseChangeLog:
  - changeSet:
      id: 14
      author: nine-tower
      changes:
        - createTable:
            tableName: task_tags
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: tag_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            constraintName: uc_task_tags
            tableName: task_tags
            columnNames: task_id, tag_id
        - createIndex:
            indexName: idx_task_tag_tag_id
            tableName: task_tags
            columns:
              - column:
                  name: tag_id
