databaseChangeLog:
  - changeSet:
      id: 21
      author: nine-tower
      changes:
        - createTable:
            tableName: playbook_environments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: playbook_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: environment_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            constraintName: uc_playbook_environments
            tableName: playbook_environments
            columnNames: playbook_id, environment_id
        - createIndex:
            indexName: idx_playbook_environment_environment_id
            tableName: playbook_environments
            columns:
              - column:
                  name: environment_id
