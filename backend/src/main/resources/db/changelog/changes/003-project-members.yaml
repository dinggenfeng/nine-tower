databaseChangeLog:
  - changeSet:
      id: 3
      author: nine-tower
      changes:
        - createTable:
            tableName: project_members
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: project_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: joined_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            constraintName: uc_project_members
            tableName: project_members
            columnNames: project_id, user_id
        - createIndex:
            indexName: idx_project_member_user_id
            tableName: project_members
            columns:
              - column:
                  name: user_id
