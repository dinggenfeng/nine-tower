databaseChangeLog:
  - changeSet:
      id: 20
      author: nine-tower
      changes:
        - createTable:
            tableName: playbook_tags
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: playbook_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: tag_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            constraintName: uc_playbook_tags
            tableName: playbook_tags
            columnNames: playbook_id, tag_id
        - createIndex:
            indexName: idx_playbook_tag_tag_id
            tableName: playbook_tags
            columns:
              - column:
                  name: tag_id
