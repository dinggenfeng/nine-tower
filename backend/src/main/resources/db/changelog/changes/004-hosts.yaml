databaseChangeLog:
  - changeSet:
      id: 4
      author: nine-tower
      changes:
        - createTable:
            tableName: hosts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: host_group_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: ip
                  type: VARCHAR(45)
                  constraints:
                    nullable: false
              - column:
                  name: port
                  type: INT
                  defaultValueNumeric: 22
                  constraints:
                    nullable: false
              - column:
                  name: ansible_user
                  type: VARCHAR(100)
              - column:
                  name: ansible_ssh_pass
                  type: VARCHAR(500)
              - column:
                  name: ansible_ssh_private_key_file
                  type: VARCHAR(2000)
              - column:
                  name: ansible_become
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_host_host_group_id
            tableName: hosts
            columns:
              - column:
                  name: host_group_id
