databaseChangeLog:
  - changeSet:
      id: 12
      author: nine-tower
      changes:
        - createTable:
            tableName: templates
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: parent_dir
                  type: VARCHAR(500)
              - column:
                  name: name
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: target_path
                  type: VARCHAR(500)
              - column:
                  name: content
                  type: TEXT
              - column:
                  name: is_directory
                  type: BOOLEAN
                  defaultValueBoolean: false
        - addUniqueConstraint:
            constraintName: uc_templates
            tableName: templates
            columnNames: role_id, parent_dir, name
