databaseChangeLog:
  - changeSet:
      id: 22
      author: nine-tower
      changes:
        - createTable:
            tableName: playbook_host_groups
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: playbook_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: host_group_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            constraintName: uc_playbook_host_groups
            tableName: playbook_host_groups
            columnNames: playbook_id, host_group_id
        - createIndex:
            indexName: idx_playbook_host_group_host_group_id
            tableName: playbook_host_groups
            columns:
              - column:
                  name: host_group_id
